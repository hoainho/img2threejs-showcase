name: PR safety check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-safety-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: node scripts/check-showcase-safety.mjs --base "${{ github.base_ref }}"
